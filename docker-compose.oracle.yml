services:
  db:
    image: mysql:8.0
    container_name: hrms-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - "./Database/jupiterapparels_Grp 16.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${IMAGE_OWNER}/hrms-backend:latest
    container_name: hrms-backend
    restart: always
    environment:
      PORT: ${BACKEND_PORT:-8800}
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      NODE_ENV: production
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    expose:
      - "${BACKEND_PORT:-8800}"
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: caddy:2.8-alpine
    container_name: hrms-proxy
    restart: always
    environment:
      API_DOMAIN: ${API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      BACKEND_PORT: ${BACKEND_PORT:-8800}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config: