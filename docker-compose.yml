services:
  db:
    image: mysql:8.0
    container_name: hrms-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jupiterapparels}
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - "./jupiterapparels_Grp 16.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: hrms-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-8800}
      DB_HOST: ${DB_HOST:-db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-jupiterapparels}
      NODE_ENV: production
    ports:
      - "${BACKEND_PORT:-8800}:${BACKEND_PORT:-8800}"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: hrms-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  db_data: