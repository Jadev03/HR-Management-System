name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  client-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run client functional tests
        run: npm run test:functional

      - name: Run client integration tests
        run: npm run test:integration

      - name: Build client
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - client-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose env
        run: |
          cp .env.example .env

      - name: Validate compose config
        run: docker compose config

      - name: Build backend and client images
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend client